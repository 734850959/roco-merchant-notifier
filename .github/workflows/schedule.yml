name: Roco Merchant Notifier

on:
  schedule:
    - cron: '0 0,4,8,12 * * *'
  workflow_dispatch:

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright jinja2

      - name: Install Playwright Browsers & OS Dependencies
        run: |
          playwright install chromium --with-deps
          sudo apt-get install -y fonts-wqy-zenhei

      - name: Run Notifier Script
        env:
          ROCOM_API_KEY: ${{ secrets.ROCOM_API_KEY }}
          IMGBB_KEY: ${{ secrets.IMGBB_KEY }}
          NOTIFYME_UUID: ${{ secrets.NOTIFYME_UUID }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python main.py
